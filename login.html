<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Client Login</title>
  <style>
    body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(160deg, #0f3c78, #2f80ed);
      padding: 24px;
    }
    .card { width:100%; max-width:480px; background:#fff; border-radius:14px; padding:28px 22px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    }
    h1 { margin:0 0 10px; font-size:22px; font-weight:600; }
    p { margin:0 0 18px; color:#444; line-height:1.5; }
    input { width:100%; padding:12px 14px; border-radius:10px; border:1px solid #ddd; font-size:14px; }
    button { width:100%; margin-top:12px; padding:12px 14px; border-radius:10px; border:0;
      background:#2f80ed; color:#fff; font-size:14px; cursor:pointer;
    }
    button:hover { background:#1c60c4; }
    .msg { margin-top:12px; font-size:14px; color:#222; }
    .small { font-size:12px; color:#666; margin-top:10px; }
    a { color:#1c60c4; text-decoration:none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Client Login</h1>
    <p>Enter your email to receive a secure login link.</p>

    <input id="email" type="email" placeholder="you@company.com" autocomplete="email" />
    <button id="send">Send login link</button>

    <div id="msg" class="msg"></div>
    <div class="small"><a href="/">← Back to home</a></div>
  </div>

  <script type="module">
    import { supabase } from "/assets/supabaseClient.js";

    const emailEl = document.getElementById("email");
    const sendBtn = document.getElementById("send");
    const msg = document.getElementById("msg");

    sendBtn.addEventListener("click", async () => {
      const email = emailEl.value.trim();
      if (!email) { msg.textContent = "Please enter an email."; return; }

      sendBtn.disabled = true;
      sendBtn.textContent = "Sending...";
      msg.textContent = "";

      const { error } = await supabase.auth.signInWithOtp({
        email,
        options: { emailRedirectTo: `${window.location.origin}/dashboard.html` }
      });

      msg.textContent = error ? `Error: ${error.message}` : "Check your email for the login link.";
      sendBtn.disabled = false;
      sendBtn.textContent = "Send login link";
    });
  </script>
</body>
</html>
